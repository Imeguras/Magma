services:
  magma:
    build: .
    image: magma:latest
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      - PATH=/opt/rocm/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - LD_LIBRARY_PATH=/opt/rocm/lib
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
      - render
    command: /bin/bash

  build:
    image: magma:latest
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - PATH=/opt/rocm/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - LD_LIBRARY_PATH=/opt/rocm/lib
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
      - render
    command: >
      sh -c "
        rm -rf build &&
        meson setup build &&
        ninja -C build
      "

  shell:
    image: magma:latest
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      - PATH=/opt/rocm/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - LD_LIBRARY_PATH=/opt/rocm/lib
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
      - render
